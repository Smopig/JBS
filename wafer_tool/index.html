<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wafer Analysis Tool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; font-size: 14px; }

.header { background: #1a365d; color: white; padding: 14px 24px; }
.header h1 { font-size: 18px; }
.header p  { font-size: 11px; opacity: 0.65; margin-top: 2px; }

/* Tabs */
.tab-nav { background: white; border-bottom: 2px solid #e2e8f0; display: flex; padding: 0 20px; gap: 4px; }
.tab-btn  { padding: 11px 18px; border: none; background: none; cursor: pointer; font-size: 13px;
            color: #666; border-bottom: 3px solid transparent; margin-bottom: -2px; }
.tab-btn.active { color: #1a365d; border-bottom-color: #1a365d; font-weight: 700; }
.tab-btn:hover  { color: #1a365d; }
.tab-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.content   { padding: 18px 22px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Upload */
.upload-area { border: 2px dashed #cbd5e0; border-radius: 8px; padding: 32px; text-align: center;
               cursor: pointer; background: white; transition: all .2s; }
.upload-area:hover, .upload-area.drag-over { border-color: #4299e1; background: #ebf8ff; }
.upload-icon { font-size: 40px; margin-bottom: 8px; }
.upload-text { font-size: 15px; color: #4a5568; }
.upload-hint { font-size: 11px; color: #a0aec0; margin-top: 4px; }

/* Settings row */
.settings-row { display: flex; align-items: flex-end; gap: 16px; margin: 14px 0; flex-wrap: wrap; }
.sg label { display: block; font-size: 11px; color: #4a5568; font-weight: 700; margin-bottom: 4px; }
.sg input  { padding: 6px 10px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 13px; }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 5px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn-blue  { background: #3182ce; color: white; }
.btn-blue:hover  { background: #2b6cb0; }
.btn-green { background: #38a169; color: white; }
.btn-green:hover { background: #276749; }
.btn-gray  { background: #edf2f7; color: #4a5568; }
.btn-gray:hover  { background: #e2e8f0; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* Status */
.status { border-radius: 6px; padding: 10px 14px; margin: 8px 0; font-size: 12px;
          border-left: 4px solid #4299e1; background: white; }
.status.ok  { border-color: #48bb78; }
.status.err { border-color: #fc8181; background: #fff5f5; }

/* File list */
.file-list { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
.file-item { display: flex; align-items: center; gap: 8px; padding: 5px 10px;
             background: #f7fafc; border-radius: 4px; font-size: 12px; }
.lot-tag   { background: #3182ce; color: white; padding: 1px 6px; border-radius: 3px;
             font-size: 10px; font-weight: 700; }

/* ── Rename section ── */
.rename-section { margin-top: 18px; background: white; border-radius: 8px;
                  box-shadow: 0 1px 4px rgba(0,0,0,.1); overflow: hidden; }
.rename-header  { display: flex; align-items: center; justify-content: space-between;
                  padding: 12px 16px; background: #2d3748; color: white; flex-wrap: wrap; gap: 8px; }
.rename-header .title { font-size: 14px; font-weight: 700; }
.rename-header .hint  { font-size: 11px; opacity: 0.75; margin-top: 2px; }
.rename-header .btns  { display: flex; gap: 8px; }
.rename-table-wrap    { max-height: 380px; overflow-y: auto; }
.rename-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.rename-table thead th { background: #4a5568; color: white; padding: 7px 12px;
                         text-align: left; position: sticky; top: 0; z-index: 2; white-space: nowrap; }
.rename-table tbody tr { border-bottom: 1px solid #e2e8f0; }
.rename-table tbody tr:hover { background: #f7fafc; }
.rename-table td  { padding: 5px 10px; vertical-align: middle; }
.orig-name { font-family: monospace; color: #718096; }
.rename-input { width: 100%; padding: 4px 8px; border: 1px solid #cbd5e0; border-radius: 4px;
                font-size: 12px; font-family: monospace; }
.rename-input:focus { border-color: #4299e1; outline: none; }
.sample-vals { font-size: 11px; color: #4a5568; font-family: monospace; line-height: 1.6;
               white-space: nowrap; }

/* Conversion badge */
.cbadge      { padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.cbadge.none { background: #edf2f7; color: #718096; }
.cbadge.ir   { background: #bee3f8; color: #2b6cb0; }
.cbadge.vr   { background: #c6f6d5; color: #276749; }
.cbadge.vf   { background: #fefcbf; color: #744210; }

.rename-footer { padding: 12px 16px; display: flex; align-items: center; gap: 12px;
                 border-top: 1px solid #e2e8f0; }

/* Step badge */
.step-badge { display: inline-flex; align-items: center; justify-content: center;
              width: 22px; height: 22px; border-radius: 50%; background: #3182ce;
              color: white; font-size: 11px; font-weight: 700; margin-right: 4px; }

/* Control panel */
.ctrl { background: white; border-radius: 8px; padding: 12px 16px; margin-bottom: 14px;
        display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
        box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.ctrl label  { font-size: 12px; color: #4a5568; font-weight: 700; white-space: nowrap; }
.ctrl select { padding: 5px 9px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 12px; }

/* Chart grid */
.chart-grid { display: grid; gap: 14px; }
.cols-1 { grid-template-columns: 1fr; }
.cols-3 { grid-template-columns: repeat(3, 1fr); }
.cols-4 { grid-template-columns: repeat(4, 1fr); }
.cols-6 { grid-template-columns: repeat(6, 1fr); }
.chart-card { background: white; border-radius: 8px; padding: 6px;
              box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }

/* Stats table */
.tbl-wrap { background: white; border-radius: 8px; overflow: auto; max-height: 70vh;
            box-shadow: 0 1px 3px rgba(0,0,0,.08); }
table.stats  { width: 100%; border-collapse: collapse; font-size: 12px; }
table.stats thead th { background: #2d3748; color: white; padding: 7px 12px; text-align: center;
                       white-space: nowrap; position: sticky; top: 0; z-index: 2; }
table.stats tbody td { padding: 5px 10px; text-align: center; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
table.stats tbody tr:nth-child(even) { background: #f7fafc; }
table.stats tbody tr:hover           { background: #ebf8ff; }
.row-label { text-align: left !important; font-weight: 700; color: #2d3748;
             background: #edf2f7 !important; position: sticky; left: 0; z-index: 1; }

/* % section header */
.section-hd { font-size: 13px; font-weight: 700; color: #2d3748; padding: 6px 10px;
              background: #edf2f7; border-radius: 6px 6px 0 0; }

/* Library error */
.lib-error { background: #fff5f5; border: 2px solid #fc8181; border-radius: 8px; padding: 20px 24px; margin: 12px 0; }
.lib-error h3 { color: #c53030; margin-bottom: 8px; }
.lib-error code { background: #fed7d7; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
.lib-error ol { margin: 8px 0 0 20px; line-height: 2; }

@media (max-width:1100px) { .cols-4,.cols-6 { grid-template-columns: repeat(3,1fr); } }
@media (max-width: 800px) { .cols-4,.cols-6,.cols-3 { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 500px) { .cols-4,.cols-6,.cols-3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>⬡ Wafer Analysis Tool</h1>
  <p>上傳 CP 測試資料，自動產生 MAP、分布圖與統計</p>
</div>

<div class="tab-nav">
  <button class="tab-btn active"  onclick="switchTab('upload',this)">📂 資料載入</button>
  <button class="tab-btn" id="tb-map"   onclick="switchTab('map',this)"   disabled>🗺 Wafer MAP</button>
  <button class="tab-btn" id="tb-count" onclick="switchTab('count',this)" disabled>📊 Count 分布</button>
  <button class="tab-btn" id="tb-pct"   onclick="switchTab('pct',this)"   disabled>📈 % 分布</button>
  <button class="tab-btn" id="tb-stats" onclick="switchTab('stats',this)" disabled>📋 統計</button>
</div>

<div class="content">

  <!-- ══ Upload ══ -->
  <div id="panel-upload" class="tab-panel active">
    <div id="libError"></div>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('fi').click()">
      <div class="upload-icon">📁</div>
      <div class="upload-text">點擊或拖曳上傳 Excel 檔案</div>
      <div class="upload-hint">支援 .xls / .xlsx，可同時選取多個 wafer 檔案</div>
    </div>
    <input type="file" id="fi" multiple accept=".xls,.xlsx" style="display:none"
           onchange="handleFiles(this.files)">

    <div class="settings-row">
      <div class="sg">
        <label>標題列號（第幾列是欄位名稱）</label>
        <input type="number" id="headerRow" value="13" min="1" max="100" style="width:80px">
      </div>
      <div class="sg">
        <label>資料起始列號</label>
        <input type="number" id="dataStart" value="30" min="1" max="200" style="width:80px">
      </div>
      <div class="sg">
        <label>&nbsp;</label>
        <button class="btn btn-blue" onclick="loadColumns()" id="btnLoad" disabled>
          <span class="step-badge">1</span> 載入欄位
        </button>
      </div>
      <div class="sg">
        <label>&nbsp;</label>
        <button class="btn btn-green" onclick="exportExcel()" id="btnExp" disabled>💾 匯出 Excel</button>
      </div>
    </div>

    <div id="fileList" class="file-list"></div>
    <div id="upStatus"></div>

    <!-- ── Rename section (shown after step 1) ── -->
    <div id="renameSection" class="rename-section" style="display:none">
      <div class="rename-header">
        <div>
          <div class="title"><span class="step-badge">2</span> 欄位命名</div>
          <div class="hint">
            修改欄位名稱 ｜ <span style="color:#90cdf4">IR_ 開頭 → 自動 ×1,000,000（A→uA）</span>
            ｜ <span style="color:#9ae6b4">VR_ → 小數 0.1</span>
            ｜ <span style="color:#fefcbf">VF_ → 小數 0.001</span>
          </div>
        </div>
        <div class="btns">
          <button class="btn btn-gray" style="font-size:12px" onclick="autoFillRename()">🔄 自動命名（VFBC/BVCBO/ICBO）</button>
          <button class="btn btn-gray" style="font-size:12px" onclick="resetRename()">↩ 還原原始名稱</button>
        </div>
      </div>

      <div class="rename-table-wrap">
        <table class="rename-table">
          <thead>
            <tr>
              <th style="width:24%">原始欄位名稱</th>
              <th style="width:30%">新名稱（可直接修改）</th>
              <th style="width:18%">數值換算方式</th>
              <th style="width:28%">參考數值（第14~19列）</th>
            </tr>
          </thead>
          <tbody id="renameBody"></tbody>
        </table>
      </div>

      <div class="rename-footer">
        <button class="btn btn-blue" onclick="applyAndAnalyze()" id="btnApply">
          <span class="step-badge" style="background:#fff;color:#3182ce">3</span> 套用命名並開始分析
        </button>
        <span style="font-size:11px; color:#718096">名稱不改也可以直接分析</span>
      </div>
    </div>
  </div>

  <!-- ══ Wafer MAP ══ -->
  <div id="panel-map" class="tab-panel">
    <div class="ctrl">
      <label>量測項目：</label>
      <select id="mapItem" onchange="renderMap()"></select>
      <label style="margin-left:12px">每列欄數：</label>
      <select id="mapCols" onchange="renderMap()">
        <option value="1">1</option><option value="3">3</option><option value="4" selected>4</option><option value="6">6</option>
      </select>
      <label style="margin-left:12px">X 軸：</label>
      <select id="mapXDir" onchange="renderMap()">
        <option value="desc" selected>大 → 小</option>
        <option value="asc">小 → 大</option>
      </select>
      <label style="margin-left:8px">Y 軸：</label>
      <select id="mapYDir" onchange="renderMap()">
        <option value="desc" selected>大 → 小</option>
        <option value="asc">小 → 大</option>
      </select>
    </div>
    <div class="ctrl">
      <label>色階樣式：</label>
      <select id="mapColorscale" onchange="renderMap()">
        <option value="WhRd">白 → 紅</option>
        <option value="RdBu">藍 ↔ 紅（對稱）</option>
        <option value="Viridis">Viridis</option>
        <option value="Rainbow">彩虹</option>
        <option value="YlOrRd">黃 → 橙 → 紅</option>
        <option value="Greys">灰階</option>
      </select>
      <label style="margin-left:16px">色階範圍：</label>
      <input id="mapZmin" type="number" placeholder="min（auto）" step="any"
             style="width:110px;padding:4px 8px;border:1px solid #cbd5e0;border-radius:4px;font-size:12px"
             oninput="renderMap()">
      <span style="font-size:13px;color:#718096;margin:0 6px">～</span>
      <input id="mapZmax" type="number" placeholder="max（auto）" step="any"
             style="width:110px;padding:4px 8px;border:1px solid #cbd5e0;border-radius:4px;font-size:12px"
             oninput="renderMap()">
      <button class="btn btn-gray" style="font-size:12px;margin-left:8px" onclick="autoZRange()">自動填入</button>
      <button class="btn btn-gray" style="font-size:12px;margin-left:4px" onclick="clearZRange()">清除</button>
    </div>
    <div id="mapGrid" class="chart-grid cols-4"></div>
  </div>

  <!-- ══ Count Dist ══ -->
  <div id="panel-count" class="tab-panel">
    <div class="ctrl">
      <label>量測項目：</label>
      <select id="cntItem" onchange="renderCount()"></select>
      <label style="margin-left:12px">每列欄數：</label>
      <select id="cntColsSel" onchange="syncCols('cnt',renderCount)">
        <option value="1">1</option><option value="2">2</option>
        <option value="3">3</option><option value="4" selected>4</option>
        <option value="6">6</option><option value="0">自訂…</option>
      </select>
      <input id="cntColsNum" type="number" min="1" max="20" value="4"
             style="display:none;width:54px;padding:4px 6px;border:1px solid #cbd5e0;border-radius:4px;font-size:12px;margin-left:4px"
             oninput="renderCount()">
    </div>
    <div id="cntGrid" class="chart-grid"></div>
  </div>

  <!-- ══ % Dist ══ -->
  <div id="panel-pct" class="tab-panel">
    <div class="ctrl">
      <label>Lot 篩選：</label>
      <select id="pctLot" onchange="renderPct()"><option value="all">全部</option></select>
      <label style="margin-left:12px">量測項目：</label>
      <select id="pctItem" onchange="renderPct()"><option value="all">全部項目</option></select>
      <label style="margin-left:12px">每列欄數：</label>
      <select id="pctColsSel" onchange="syncCols('pct',renderPct)">
        <option value="1">1</option><option value="2">2</option>
        <option value="3">3</option><option value="4" selected>4</option>
        <option value="6">6</option><option value="0">自訂…</option>
      </select>
      <input id="pctColsNum" type="number" min="1" max="20" value="4"
             style="display:none;width:54px;padding:4px 6px;border:1px solid #cbd5e0;border-radius:4px;font-size:12px;margin-left:4px"
             oninput="renderPct()">
    </div>
    <div class="ctrl">
      <label>X 軸範圍：</label>
      <input id="pctXmin" type="number" step="any" placeholder="auto"
             style="width:90px;padding:4px 7px;border:1px solid #cbd5e0;border-radius:4px;font-size:12px"
             oninput="renderPct()">
      <span style="margin:0 5px;color:#718096">～</span>
      <input id="pctXmax" type="number" step="any" placeholder="auto"
             style="width:90px;padding:4px 7px;border:1px solid #cbd5e0;border-radius:4px;font-size:12px"
             oninput="renderPct()">
      <label style="margin-left:16px">Y 軸範圍：</label>
      <input id="pctYmin" type="number" step="any" placeholder="0"
             style="width:72px;padding:4px 7px;border:1px solid #cbd5e0;border-radius:4px;font-size:12px"
             oninput="renderPct()">
      <span style="margin:0 5px;color:#718096">～</span>
      <input id="pctYmax" type="number" step="any" placeholder="100"
             style="width:72px;padding:4px 7px;border:1px solid #cbd5e0;border-radius:4px;font-size:12px"
             oninput="renderPct()">
      <button class="btn btn-gray" style="font-size:12px;margin-left:8px" onclick="resetPctAxes()">還原預設</button>
    </div>
    <div id="pctArea"></div>
  </div>

  <!-- ══ Statistics ══ -->
  <div id="panel-stats" class="tab-panel">
    <!-- Row 1: item + export -->
    <div class="ctrl">
      <label>量測項目：</label>
      <select id="stItem" onchange="switchStatItem()"></select>
      <button class="btn btn-green" onclick="exportExcel()" style="margin-left:auto">💾 匯出 Excel</button>
    </div>
    <!-- Row 2: stat chips + reset -->
    <div class="ctrl" style="flex-wrap:wrap;gap:8px;align-items:center">
      <label style="white-space:nowrap;font-weight:700;font-size:12px">顯示統計列：</label>
      <div id="stChips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      <button class="btn btn-gray" style="font-size:12px;margin-left:8px" onclick="resetStats()">↩ 一鍵還原預設</button>
    </div>
    <!-- Row 3: custom formula -->
    <div class="ctrl" style="flex-wrap:wrap;gap:8px;align-items:flex-start">
      <label style="white-space:nowrap;font-weight:700;font-size:12px">自訂計算：</label>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <input id="stFnLabel" type="text" placeholder="名稱（如 Cpk）"
               style="width:110px;padding:4px 7px;border:1px solid #cbd5e0;border-radius:4px;font-size:12px">
        <span style="font-size:11px;color:#718096">=</span>
        <input id="stFnFormula" type="text" placeholder="可用：Count Min Max Mean Median Std LSL USL Typical"
               style="width:360px;padding:4px 7px;border:1px solid #cbd5e0;border-radius:4px;font-size:12px">
        <button class="btn btn-blue" style="font-size:12px" onclick="addCustomStat()">新增</button>
      </div>
      <div id="stFnList" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px;width:100%"></div>
    </div>
    <div id="stTable" class="tbl-wrap"></div>
  </div>

</div><!-- /content -->

<script src="libs/xlsx.full.min.js"></script>
<script src="libs/plotly.min.js"></script>
<script>
'use strict';
// ══════════════════════════════════════════════════
// 標準命名對照（僅供「套用標準命名」按鈕使用）
// ══════════════════════════════════════════════════
const STD_RENAME = {
  '2 VFBC':'VF_5mA(V)',    '3 ICBO':'IR_1V(uA)',     '4 ICBO2':'IR_10V(uA)',
  '5 ICBO3':'IR_30V(uA)',  '6 ICBO4':'IR_50V(uA)',   '7 ICBO5':'IR_60V(uA)',
  '8 ICBO6':'IR_68V(uA)',  '9 ICBO7':'IR_71V(uA)',   '10 ICBO8':'IR_74V(uA)',
  '11 BVCBO':'VR_10uA(V)', '12 BVCBO2':'VR_100uA(V)','13 BVCBO3':'VR_1mA(V)',
  '14 BVCBO4':'VR_10mA(V)','16 VFBC2':'VF_10mA(V)',  '17 VFBC3':'VF_260mA(V)',
  '18 VFBC4':'VF_1A(V)',   '19 VFBCH':'VF_10A(V)'
};

const META_COLS     = new Set(['Lot','Serial','Bin','Xpos','Ypos','YY,XX']);
const N_BINS        = 25;
const DEFAULT_STATS = ['Count','Min','Max','Mean','Median','Std'];

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
const S = {
  files: [], data: [], lots: [], items: [], globalBins: {},
  _rawCols: [], _colSamples: {}, _headerIdx: 12, _dataStartIdx: 29,
  activeStats:   [...DEFAULT_STATS],
  customStats:   [],
  statSpecs:     {},
  statFormats:   {},                   // { statKey: { type:'fixed'|'sci', decimals:N } }
  _prevStatItem: ''
};

// ══════════════════════════════════════════════════
// TAB NAVIGATION
// ══════════════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  setTimeout(() => {
    document.querySelectorAll('#panel-' + name + ' [id^="ch-"]').forEach(el => {
      if (el._fullLayout) Plotly.Plots.resize(el);
    });
  }, 60);
}

// ══════════════════════════════════════════════════
// DRAG & DROP
// ══════════════════════════════════════════════════
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over'); handleFiles(e.dataTransfer.files);
});

// ══════════════════════════════════════════════════
// FILE HANDLING
// ══════════════════════════════════════════════════
function getLotName(fname) {
  const base  = fname.replace(/\.(xls|xlsx)$/i, '');
  const parts = base.split('-');
  return parts.length >= 2 ? parts[1] : base;
}

function handleFiles(files) {
  S.files = Array.from(files);
  document.getElementById('fileList').innerHTML =
    S.files.map(f => {
      const lot = getLotName(f.name);
      return `<div class="file-item">📄 ${f.name} <span class="lot-tag">${lot}</span></div>`;
    }).join('');
  document.getElementById('btnLoad').disabled = S.files.length === 0;
  document.getElementById('renameSection').style.display = 'none';
  document.getElementById('upStatus').innerHTML =
    `<div class="status">已選取 ${S.files.length} 個檔案，確認設定後點擊「步驟 1：載入欄位」</div>`;
}

// ══════════════════════════════════════════════════
// STEP 1：LOAD COLUMNS → SHOW RENAME TABLE
// ══════════════════════════════════════════════════
async function loadColumns() {
  S._headerIdx   = parseInt(document.getElementById('headerRow').value) - 1;
  S._dataStartIdx = parseInt(document.getElementById('dataStart').value) - 1;

  document.getElementById('upStatus').innerHTML =
    '<div class="status">⏳ 讀取欄位中...</div>';
  await tick();

  const allCols    = new Set();
  const colSamples = {};  // colName → string[]
  const errs = [];

  for (const file of S.files) {
    try {
      const buf  = await file.arrayBuffer();
      const wb   = XLSX.read(buf, { type:'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
      if (rows.length <= S._headerIdx) { errs.push(file.name); continue; }
      const headerRow  = rows[S._headerIdx];
      const sampleRows = rows.slice(S._headerIdx + 1, S._headerIdx + 7); // 6 rows below header
      headerRow.forEach((h, ci) => {
        if (h != null) {
          const s = String(h).trim();
          if (s && !META_COLS.has(s) && !s.includes('SOT_SOT')) {
            allCols.add(s);
            if (!colSamples[s]) {
              colSamples[s] = sampleRows
                .map(r => (r && r[ci] != null) ? String(r[ci]).trim() : '')
                .filter(v => v !== '');
            }
          }
        }
      });
    } catch(e) { errs.push(file.name); }
  }

  S._rawCols     = [...allCols];
  S._colSamples  = colSamples;
  buildRenameTable(S._rawCols);
  document.getElementById('renameSection').style.display = 'block';

  const errMsg = errs.length ? `（${errs.length} 個檔案讀取失敗）` : '';
  document.getElementById('upStatus').innerHTML =
    `<div class="status ok">✅ 偵測到 ${S._rawCols.length} 個量測欄位${errMsg}，請確認或修改命名後執行步驟 3</div>`;
}

// ══════════════════════════════════════════════════
// RENAME TABLE UI
// ══════════════════════════════════════════════════
function buildRenameTable(cols) {
  const tbody = document.getElementById('renameBody');
  tbody.innerHTML = '';
  cols.forEach((col, idx) => {
    const tr = document.createElement('tr');
    const inputId = `ri_${idx}`;
    const badgeId = `rb_${idx}`;
    const samples  = (S._colSamples[col] || []).slice(0, 6);
    const sampHtml = samples.length
      ? samples.map(v => escHtml(v)).join('<br>')
      : '<span style="color:#a0aec0">—</span>';
    tr.innerHTML = `
      <td><span class="orig-name">${escHtml(col)}</span></td>
      <td>
        <input id="${inputId}" class="rename-input" type="text" value="${escHtml(col)}"
               oninput="updateBadge(this,'${badgeId}')">
      </td>
      <td style="text-align:center">
        <span id="${badgeId}" class="cbadge none">不換算</span>
      </td>
      <td class="sample-vals">${sampHtml}</td>`;
    tbody.appendChild(tr);
    updateBadge(document.getElementById(inputId), badgeId);
  });
}

function updateBadge(inputEl, badgeId) {
  const name = inputEl.value.trim();
  const el   = document.getElementById(badgeId);
  if (name.startsWith('IR_')) {
    el.className = 'cbadge ir'; el.textContent = '× 1,000,000 → uA';
  } else if (name.startsWith('VR_')) {
    el.className = 'cbadge vr'; el.textContent = 'round 0.1';
  } else if (name.startsWith('VF_')) {
    el.className = 'cbadge vf'; el.textContent = 'round 0.001';
  } else {
    el.className = 'cbadge none'; el.textContent = '不換算';
  }
}

function autoFillRename() {
  S._rawCols.forEach((col, idx) => {
    const inp     = document.getElementById(`ri_${idx}`);
    const samples = S._colSamples[col] || [];
    const cond    = parseConditionLabel(samples[0]);
    let newName   = null;

    if      (col.includes('VFBC')  && cond) newName = `VF_${cond}`;
    else if (col.includes('BVCBO') && cond) newName = `VR_${cond}`;
    else if (col.includes('ICBO')  && cond) newName = `IR_${cond}`;

    if (newName) {
      inp.value = newName;
      updateBadge(inp, `rb_${idx}`);
    }
  });
}

// 解析條件字串：去掉 "IC=" / "VCB=" 等前綴，正規化數字（21.0→21）
function parseConditionLabel(raw) {
  if (raw == null || raw === '') return null;
  // 去掉 "IC=" / "VCB=" / "IF=" 等前綴
  let s = String(raw).replace(/^[A-Za-z_]+=\s*/, '').trim();
  // 比對數字 + 單位，例如 "21.0V"、"100uA"、"260mA"、"1A"
  const m = s.match(/^([\d.]+)\s*([a-zA-Z]+)$/);
  if (!m) return null;
  const num  = parseFloat(m[1]);
  const unit = m[2];
  // 整數值去掉小數點（21.0 → 21，1.5 保留）
  const numStr = (num === Math.floor(num)) ? String(Math.floor(num)) : String(num);
  return numStr + unit;
}

function resetRename() {
  S._rawCols.forEach((col, idx) => {
    const inp = document.getElementById(`ri_${idx}`);
    inp.value = col;
    updateBadge(inp, `rb_${idx}`);
  });
}

// ══════════════════════════════════════════════════
// STEP 3：APPLY RENAME + ANALYZE
// ══════════════════════════════════════════════════
async function applyAndAnalyze() {
  // Build rename map from table
  const renameMap = {};
  S._rawCols.forEach((col, idx) => {
    const newName = document.getElementById(`ri_${idx}`).value.trim() || col;
    if (newName !== col) renameMap[col] = newName;
  });

  document.getElementById('upStatus').innerHTML =
    '<div class="status">⏳ 分析中，請稍候...</div>';
  await tick();

  S.data = [];
  const errs = [];

  for (const file of S.files) {
    try {
      const lot  = getLotName(file.name);
      const buf  = await file.arrayBuffer();
      const wb   = XLSX.read(buf, { type:'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
      if (rows.length <= S._headerIdx) { errs.push(`${file.name}：列數不足`); continue; }

      const rawH  = rows[S._headerIdx].map(h => h != null ? String(h).trim() : '');
      const heads = rawH.map(h => renameMap[h] ?? h);  // apply rename

      const dataRows = rows.slice(S._dataStartIdx)
        .filter(r => r && r.some(v => v !== null && v !== undefined && v !== ''));
      if (!dataRows.length) { errs.push(`${file.name}：無資料`); continue; }

      dataRows.forEach(row => {
        const obj = { Lot: lot };
        heads.forEach((h, i) => {
          if (!h || h.includes('SOT_SOT')) return;
          obj[h] = row[i] ?? null;
        });
        S.data.push(obj);
      });
    } catch(e) { errs.push(`${file.name}：${e.message}`); }
  }

  // Unit conversion — based on FINAL column names
  S.data.forEach(row => {
    Object.keys(row).forEach(k => {
      const v = parseFloat(row[k]);
      if (isNaN(v)) return;
      if      (k.startsWith('IR_')) row[k] = rd(v * 1e6, 2);
      else if (k.startsWith('VR_')) row[k] = rd(v, 1);
      else if (k.startsWith('VF_')) row[k] = rd(v, 3);
    });
  });

  // Lots & items
  S.lots  = [...new Set(S.data.map(r => r.Lot))].sort();
  const allCols = new Set(S.data.flatMap(r => Object.keys(r)));
  S.items = [...allCols].filter(c => !META_COLS.has(c));

  // Global bin edges for ALL items (for % distribution)
  S.globalBins = {};
  S.items.forEach(item => {
    const vals = validData(null, item);
    if (vals.length >= 3) {
      const lo = Math.min(...vals), hi = Math.max(...vals);
      if (hi > lo) S.globalBins[item] = linspace(lo, hi, N_BINS + 1);
    }
  });

  populateSels();

  ['map','count','pct','stats'].forEach(t =>
    document.getElementById('tb-' + t).disabled = false);

  const errHtml = errs.length ? `<div class="status err">⚠️ ${errs.join('<br>')}</div>` : '';
  document.getElementById('upStatus').innerHTML =
    `<div class="status ok">✅ 完成：${S.lots.length} 個 Lot，${S.data.length} 筆資料，${S.items.length} 個量測項目</div>${errHtml}`;
  document.getElementById('btnExp').disabled = false;

  renderStatChips(); renderCustomStatTags();
  renderMap(); renderCount(); renderPct(); renderStats();
}

function populateSels() {
  const opts = S.items.map(i => `<option value="${i}">${i}</option>`).join('');
  ['mapItem','cntItem','stItem'].forEach(id =>
    document.getElementById(id).innerHTML = opts);

  document.getElementById('pctItem').innerHTML =
    '<option value="all">全部項目</option>' + opts;
  document.getElementById('pctLot').innerHTML =
    '<option value="all">全部</option>' +
    S.lots.map(l => `<option value="${l}">${l}</option>`).join('');
}

// MATH UTILS
// ══════════════════════════════════════════════════
const rd = (v, d) => Math.round(v * 10**d) / 10**d;
function mean(a)   { return a.reduce((s,v)=>s+v,0)/a.length; }
function std(a)    {
  if (a.length<2) return 0;
  const m=mean(a);
  return Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/(a.length-1));
}
function median(a) {
  const s=[...a].sort((x,y)=>x-y), m=Math.floor(s.length/2);
  return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
}
function normPDF(x,mu,sg) {
  if (sg<=0) return 0;
  return Math.exp(-0.5*((x-mu)/sg)**2)/(sg*Math.sqrt(2*Math.PI));
}
function linspace(a,b,n) {
  return Array.from({length:n},(_,i)=>a+(b-a)*i/(n-1));
}
function makeHist(data,edges) {
  const n=edges.length-1, bw=edges[1]-edges[0];
  const counts=new Array(n).fill(0);
  data.forEach(v=>{
    let i=Math.floor((v-edges[0])/bw);
    if(i<0)i=0; if(i>=n)i=n-1;
    counts[i]++;
  });
  return counts;
}
function binCenters(edges) { return edges.slice(0,-1).map((e,i)=>(e+edges[i+1])/2); }
function validData(lot,item) {
  return (lot ? S.data.filter(r=>r.Lot===lot) : S.data)
    .map(r=>parseFloat(r[item])).filter(v=>!isNaN(v));
}
function tick() { return new Promise(r=>setTimeout(r,10)); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let _uid=0;
function uid(p,k) { return `ch-${p}-${String(k).replace(/[^a-zA-Z0-9]/g,'_')}_${++_uid}`; }

// SPEC / CUSTOM STATS
// ══════════════════════════════════════════════════
function sk(key) { return key.replace(/[^a-zA-Z0-9]/g, '_'); } // safe ID fragment

function getAllStatFns() {
  const fns = {};
  Object.entries(STAT_FNS).forEach(([k, fn]) => fns[k] = fn);
  S.customStats.forEach(cs => { fns[cs.label] = makeCustomFn(cs.formula); });
  return fns;
}

// ── Active stats management ──
function addStat(key) {
  if (!S.activeStats.includes(key)) { S.activeStats.push(key); renderStatChips(); renderStats(); }
}
function removeStat(key) {
  S.activeStats = S.activeStats.filter(k => k !== key);
  renderStatChips(); renderStats();
}
function resetStats() {
  S.activeStats = [...DEFAULT_STATS];
  renderStatChips(); renderStats();
}
function renderStatChips() {
  const el = document.getElementById('stChips');
  if (!el) return;
  const allKeys  = [...DEFAULT_STATS, ...S.customStats.map(cs => cs.label)];
  const activeSet = new Set(S.activeStats);
  el.innerHTML = allKeys.map(key => {
    const on = activeSet.has(key);
    return `<span onclick="${on ? `removeStat('${escHtml(key)}')` : `addStat('${escHtml(key)}')`}"
                  title="${on ? '點擊移除此列' : '點擊加入此列'}"
                  style="display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;
                         font-size:12px;cursor:pointer;user-select:none;transition:all .15s;
                         ${on ? 'background:#3182ce;color:white' : 'background:#e2e8f0;color:#4a5568'}">
              ${escHtml(key)}&nbsp;${on ? '×' : '+'}
            </span>`;
  }).join('');
}

// ── Custom formulas ──
function makeCustomFn(formula) {
  return (d, spec) => {
    try {
      const r = new Function('Count','Min','Max','Mean','Median','Std','LSL','USL','Typical',
        `"use strict"; return (${formula})`)(
        d.length, Math.min(...d), Math.max(...d), mean(d), median(d), std(d),
        spec?.lsl ?? null, spec?.usl ?? null, spec?.typical ?? null);
      return r;
    } catch(e) { return 'ERR'; }
  };
}
function addCustomStat() {
  const label   = document.getElementById('stFnLabel').value.trim();
  const formula = document.getElementById('stFnFormula').value.trim();
  if (!label || !formula) return;
  if (S.customStats.some(cs => cs.label === label)) return;
  S.customStats.push({ label, formula });
  S.activeStats.push(label);
  document.getElementById('stFnLabel').value = '';
  document.getElementById('stFnFormula').value = '';
  renderCustomStatTags(); renderStatChips(); renderStats();
}
function removeCustomFormula(i) {
  const label = S.customStats[i].label;
  S.customStats.splice(i, 1);
  S.activeStats = S.activeStats.filter(k => k !== label);
  renderCustomStatTags(); renderStatChips(); renderStats();
}
function renderCustomStatTags() {
  const el = document.getElementById('stFnList');
  if (!el) return;
  el.innerHTML = S.customStats.map((cs, i) =>
    `<span style="display:inline-flex;align-items:center;gap:4px;background:#edf2f7;
                  border-radius:4px;padding:2px 8px;font-size:11px;white-space:nowrap">
       <b>${escHtml(cs.label)}</b>: <code style="color:#553c9a">${escHtml(cs.formula)}</code>
       <button onclick="removeCustomFormula(${i})" title="永久刪除此公式"
               style="border:none;background:none;cursor:pointer;color:#fc8181;font-size:14px;line-height:1;padding:0 2px">×</button>
     </span>`).join('');
}

// ── Spec per cell ──
function saveSpecCell(item, key, field, val) {
  if (!S.statSpecs[item])      S.statSpecs[item] = {};
  if (!S.statSpecs[item][key]) S.statSpecs[item][key] = {};
  S.statSpecs[item][key][field] = val !== '' ? parseFloat(val) : null;
  recolorStatRow(item, key);
}
function recolorStatRow(item, key) {
  const spec = (S.statSpecs[item] || {})[key] || {};
  const fn   = getAllStatFns()[key];
  if (!fn) return;
  S.lots.forEach(lot => {
    const cell = document.getElementById(`stc_${sk(key)}_${sk(lot)}`);
    if (!cell) return;
    const d      = validData(lot, item);
    if (!d.length) return;
    const rawVal = fn(d, spec);
    cell.setAttribute('style', specColor(key, rawVal, spec) || '');
    cell.textContent = formatStatVal(key, rawVal);
  });
}
function specColor(statName, value, spec) {
  if (!spec || statName === 'Count') return '';
  const v = parseFloat(value);
  if (isNaN(v)) return '';
  if (spec.lsl != null && v < spec.lsl) return 'background:#fed7d7;color:#c53030;font-weight:700';
  if (spec.usl != null && v > spec.usl) return 'background:#fed7d7;color:#c53030;font-weight:700';
  return '';
}

// ── Number format ──
function getStatFmt(key) {
  return S.statFormats[key] || { type: 'fixed', decimals: key === 'Count' ? 0 : 4 };
}
function formatStatVal(key, val) {
  if (typeof val !== 'number' || isNaN(val)) return String(val ?? '—');
  const fmt = getStatFmt(key);
  const d   = Math.max(0, Math.min(10, parseInt(fmt.decimals) || 0));
  try { return fmt.type === 'sci' ? val.toExponential(d) : val.toFixed(d); }
  catch(e) { return String(val); }
}
function saveStatFormat(key, field, val) {
  if (!S.statFormats[key]) S.statFormats[key] = { ...getStatFmt(key) };
  S.statFormats[key][field] = field === 'decimals' ? (parseInt(val) || 0) : val;
  renderStats();
}

// ══════════════════════════════════════════════════
function renderMap() {
  const item       = document.getElementById('mapItem').value;
  const cols       = document.getElementById('mapCols').value;
  const xDesc      = document.getElementById('mapXDir').value === 'desc';
  const yDesc      = document.getElementById('mapYDir').value === 'desc';
  const csKey      = document.getElementById('mapColorscale').value;
  const colorscale = COLORSCALES[csKey] || COLORSCALES.WhRd;
  const zminRaw    = document.getElementById('mapZmin').value;
  const zmaxRaw    = document.getElementById('mapZmax').value;
  const zmin       = zminRaw !== '' ? parseFloat(zminRaw) : undefined;
  const zmax       = zmaxRaw !== '' ? parseFloat(zmaxRaw) : undefined;
  const grid       = document.getElementById('mapGrid');
  if(!item) return;
  grid.className = `chart-grid cols-${cols}`;
  grid.innerHTML = '';

  S.lots.forEach(lot => {
    const rows = S.data.filter(r => r.Lot === lot);
    const xSet = [...new Set(rows.map(r => parseFloat(r.Xpos)).filter(v => !isNaN(v)))].sort((a,b) => a-b);
    const ySet = [...new Set(rows.map(r => parseFloat(r.Ypos)).filter(v => !isNaN(v)))].sort((a,b) => a-b);
    const z = ySet.map(y => xSet.map(x => {
      const m = rows.find(r => parseFloat(r.Xpos)===x && parseFloat(r.Ypos)===y);
      return m ? (parseFloat(m[item]) ?? null) : null;
    }));
    const xMin = xSet[0], xMax = xSet[xSet.length-1];
    const yMin = ySet[0], yMax = ySet[ySet.length-1];
    const xPad = (xMax-xMin)*0.03 || 0.5;
    const yPad = (yMax-yMin)*0.03 || 0.5;

    // X: desc → reversed (大在左)；asc → 正常 (小在左)
    const xAxis = { title:{text:'Xpos',font:{size:10}},
                    autorange: xDesc ? 'reversed' : true };
    // Y: desc → 大在上 range[yMax,yMin]；asc → 小在上 range[yMin,yMax]
    const yAxis = { title:{text:'Ypos',font:{size:10}},
                    range: yDesc ? [yMax+yPad, yMin-yPad] : [yMin-yPad, yMax+yPad] };

    const id = uid('map', lot);
    grid.insertAdjacentHTML('beforeend',
      `<div class="chart-card"><div id="${id}" style="height:290px"></div></div>`);
    Plotly.newPlot(id, [{
      type:'heatmap', z, x:xSet, y:ySet,
      colorscale,
      zmin: zmin !== undefined ? zmin : undefined,
      zmax: zmax !== undefined ? zmax : undefined,
      hoverongaps:false,
      hovertemplate:'X=%{x}<br>Y=%{y}<br>值=%{z}<extra></extra>'
    }], {
      title:{text:`${lot} — ${item}`,font:{size:11}},
      margin:{t:36,b:36,l:44,r:10},
      xaxis: xAxis,
      yaxis: yAxis,
      height:290
    }, {responsive:true, displayModeBar:false});
  });
}

// ══════════════════════════════════════════════════
// COUNT DISTRIBUTION
// ══════════════════════════════════════════════════
function renderCount() {
  const item = document.getElementById('cntItem').value;
  const n    = getCols('cnt');
  const grid = document.getElementById('cntGrid');
  if (!item) return;
  setGridCols(grid, n);
  grid.innerHTML = '';

  S.lots.forEach(lot => {
    const data = validData(lot, item);
    if (data.length < 3) return;
    const mu = mean(data), sg = std(data);
    const edges = linspace(Math.min(...data), Math.max(...data), N_BINS + 1);
    const bw = edges[1] - edges[0];
    const bc = binCenters(edges);
    const cnts  = makeHist(data, edges);
    const curve = bc.map(x => normPDF(x, mu, sg) * data.length * bw);

    const id = uid('cnt', lot + item);
    grid.insertAdjacentHTML('beforeend',
      `<div class="chart-card"><div id="${id}" style="height:250px"></div></div>`);
    Plotly.newPlot(id, [
      { type:'bar', x:bc, y:cnts, name:'Count', width:bw*0.98,
        marker:{color:'rgba(66,153,225,0.65)',line:{color:'rgba(66,153,225,1)',width:0.5}},
        hovertemplate:'%{x:.4g}: %{y}<extra></extra>' },
      { type:'scatter', mode:'lines', x:bc, y:curve, name:'Normal',
        line:{color:'#e53e3e',width:2,shape:'spline'},
        hovertemplate:'%{x:.4g}: %{y:.2f}<extra></extra>' }
    ], {
      title:{text:`${lot} — ${item}<br><sup>n=${data.length}  mean=${rd(mu,4)}  std=${rd(sg,4)}</sup>`,font:{size:10}},
      margin:{t:54,b:34,l:44,r:10}, showlegend:false, bargap:0,
      yaxis:{title:{text:'Count',font:{size:10}}},
      height:250
    }, {responsive:true, displayModeBar:false});
  });
}

// ══════════════════════════════════════════════════
// PERCENTAGE DISTRIBUTION
// ══════════════════════════════════════════════════
function renderPct() {
  const selItem = document.getElementById('pctItem').value;
  const selLot  = document.getElementById('pctLot').value;
  const n       = getCols('pct');
  const area    = document.getElementById('pctArea');
  area.innerHTML = '';

  const xMinV = document.getElementById('pctXmin').value;
  const xMaxV = document.getElementById('pctXmax').value;
  const yMinV = document.getElementById('pctYmin').value;
  const yMaxV = document.getElementById('pctYmax').value;
  const hasXOvr = xMinV !== '' && xMaxV !== '';
  const yMin = yMinV !== '' ? parseFloat(yMinV) : 0;
  const yMax = yMaxV !== '' ? parseFloat(yMaxV) : 100;

  const lots  = (selLot === 'all') ? S.lots : [selLot];
  const items = (selItem === 'all')
    ? S.items.filter(i => S.globalBins[i])
    : (S.globalBins[selItem] ? [selItem] : []);

  items.forEach(item => {
    const edges = S.globalBins[item];
    const bw    = edges[1] - edges[0];
    const bc    = binCenters(edges);
    const xRange = hasXOvr
      ? [parseFloat(xMinV), parseFloat(xMaxV)]
      : [edges[0], edges[edges.length - 1]];

    const sec = document.createElement('div');
    sec.style.cssText = 'margin-bottom:18px;background:white;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)';
    sec.innerHTML = `<div class="section-hd">${item}（% 分布 ｜ X 軸統一 ｜ Y 軸 ${yMin}–${yMax}%）</div>`;
    const grid = document.createElement('div');
    grid.style.cssText = `display:grid;gap:14px;grid-template-columns:repeat(${n},1fr);padding:10px`;
    sec.appendChild(grid);
    area.appendChild(sec);

    lots.forEach(lot => {
      const data = validData(lot, item);
      if (data.length < 3) return;
      const mu   = mean(data), sg = std(data);
      const cnts = makeHist(data, edges);
      const pct  = cnts.map(c => c / data.length * 100);
      const curve = bc.map(x => normPDF(x, mu, sg) * bw * 100);

      const id = uid('pct', lot + item);
      grid.insertAdjacentHTML('beforeend',
        `<div class="chart-card"><div id="${id}" style="height:230px"></div></div>`);
      Plotly.newPlot(id, [
        { type:'bar', x:bc, y:pct, name:'%', width:bw*0.98,
          marker:{color:'rgba(72,187,120,0.65)',line:{color:'rgba(72,187,120,1)',width:0.5}},
          hovertemplate:'%{x:.4g}: %{y:.1f}%<extra></extra>' },
        { type:'scatter', mode:'lines', x:bc, y:curve, name:'Normal',
          line:{color:'#e53e3e',width:2,shape:'spline'},
          hovertemplate:'%{x:.4g}: %{y:.2f}%<extra></extra>' }
      ], {
        title:{text:`${lot}<br><sup>n=${data.length}  mean=${rd(mu,4)}  std=${rd(sg,4)}</sup>`,font:{size:10}},
        margin:{t:50,b:34,l:44,r:10}, showlegend:false, bargap:0,
        yaxis:{title:{text:'%',font:{size:10}}, range:[yMin, yMax]},
        xaxis:{range: xRange},
        height:230
      }, {responsive:true, displayModeBar:false});
    });
  });
}

// ══════════════════════════════════════════════════
// STATISTICS
// ══════════════════════════════════════════════════
const STAT_FNS={
  'Count': d=>d.length,
  'Min':   d=>Math.min(...d),
  'Max':   d=>Math.max(...d),
  'Mean':  d=>mean(d),
  'Median':d=>median(d),
  'Std':   d=>std(d)
};
function renderStats() {
  const item = document.getElementById('stItem').value;
  const el   = document.getElementById('stTable');
  if (!item) return;

  const allFns = getAllStatFns();
  const SINP   = `style="width:68px;padding:3px 5px;border:1px solid #e2e8f0;border-radius:3px;font-size:11px;text-align:center"`;
  const FINP   = `style="width:40px;padding:2px 4px;border:1px solid #e2e8f0;border-radius:3px;font-size:11px;text-align:center"`;
  const FSEL   = `style="font-size:11px;padding:2px 3px;border:1px solid #e2e8f0;border-radius:3px;max-width:52px"`;

  let h = `<table class="stats"><thead><tr>
    <th class="row-label" style="min-width:90px">統計項目</th>`;
  S.lots.forEach(l => { h += `<th>${escHtml(l)}</th>`; });
  h += `<th style="background:#744210;min-width:72px">LSL</th>
        <th style="background:#744210;min-width:72px">Typical</th>
        <th style="background:#744210;min-width:72px">USL</th>
        <th style="background:#276749;min-width:60px">格式</th>
        <th style="background:#276749;min-width:50px">位數</th>
        <th style="background:#4a5568;width:28px"></th>
        </tr></thead><tbody>`;

  S.activeStats.forEach(key => {
    const fn    = allFns[key];
    if (!fn) return;
    const spec  = (S.statSpecs[item] || {})[key] || {};
    const fmt   = getStatFmt(key);
    const safeK = sk(key);
    const esc_item = escHtml(item), esc_key = escHtml(key);

    h += `<tr><td class="row-label">${escHtml(key)}</td>`;

    S.lots.forEach(lot => {
      const d = validData(lot, item);
      if (!d.length) { h += `<td id="stc_${safeK}_${sk(lot)}">—</td>`; return; }
      const rawVal  = fn(d, spec);
      const dispVal = formatStatVal(key, rawVal);
      const sty     = specColor(key, rawVal, spec);
      h += `<td id="stc_${safeK}_${sk(lot)}" style="${sty}">${dispVal}</td>`;
    });

    // LSL / Typical / USL
    h += `<td style="padding:3px 5px">
            <input type="number" step="any" placeholder="—" ${SINP}
                   value="${spec.lsl ?? ''}"
                   onchange="saveSpecCell('${esc_item}','${esc_key}','lsl',this.value)">
          </td>
          <td style="padding:3px 5px">
            <input type="number" step="any" placeholder="—" ${SINP}
                   value="${spec.typical ?? ''}"
                   onchange="saveSpecCell('${esc_item}','${esc_key}','typical',this.value)">
          </td>
          <td style="padding:3px 5px">
            <input type="number" step="any" placeholder="—" ${SINP}
                   value="${spec.usl ?? ''}"
                   onchange="saveSpecCell('${esc_item}','${esc_key}','usl',this.value)">
          </td>`;

    // Format type select
    h += `<td style="padding:3px 5px;text-align:center">
            <select ${FSEL} onchange="saveStatFormat('${esc_key}','type',this.value)">
              <option value="fixed" ${fmt.type==='fixed'?'selected':''}>0.0</option>
              <option value="sci"   ${fmt.type==='sci'  ?'selected':''}>1e</option>
            </select>
          </td>`;

    // Decimal places input
    h += `<td style="padding:3px 5px;text-align:center">
            <input type="number" min="0" max="10" ${FINP}
                   value="${fmt.decimals}"
                   onchange="saveStatFormat('${esc_key}','decimals',this.value)">
          </td>`;

    // Delete button
    h += `<td style="text-align:center">
            <button onclick="removeStat('${esc_key}')" title="移除此列"
                    style="border:none;background:none;cursor:pointer;color:#a0aec0;
                           font-size:17px;line-height:1;padding:0 4px">×</button>
          </td></tr>`;
  });

  h += `</tbody></table>`;
  el.innerHTML = h;
}

// ══════════════════════════════════════════════════
// EXPORT EXCEL
// ══════════════════════════════════════════════════
function exportExcel() {
  if(!S.data.length) return;
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.data),'合併資料');
  const statRows=[];
  S.items.forEach(item=>{
    Object.entries(STAT_FNS).forEach(([stat,fn])=>{
      const row={'統計_項目':`${stat}_${item}`};
      S.lots.forEach(lot=>{ const d=validData(lot,item); row[lot]=d.length?fn(d):null; });
      statRows.push(row);
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(statRows),'統計');
  XLSX.writeFile(wb,`wafer_analysis_${new Date().toISOString().slice(0,10)}.xlsx`);
}
